# Modem compatibility settings
# MODEM_PROFILE options: auto, huawei_hilink, huawei_stick, generic_ethernet, generic_ppp
MODEM_PROFILE=generic_ethernet

# Space-separated modem USB IDs from lsusb in vendor:product format. Wildcards are supported.
# This is a curated cellular modem vendor allowlist, not a guarantee that every USB mode works.
# A new generic modem must be listed here before the delayed fallback will start the modem stack.
MODEM_USB_IDS="12d1:* 19d2:* 2c7c:* 1199:* 2dee:* 05c6:* 1bc7:* 413c:* 1410:*"

# Ethernet modem interface settings
MODEM_ETH_IFACE=auto
MODEM_ETH_IFACE_PREFIXES="eth usb wwan enx"

# PPP modem interface settings
MODEM_PPP_IFACE=ppp0
MODEM_SERIAL_CTRL=auto
MODEM_SERIAL_PPP=auto

# usb_modeswitch settings (used by many Huawei sticks)
# MODEM_ENABLE_USB_MODESWITCH options: auto, 1, 0
MODEM_ENABLE_USB_MODESWITCH=auto
MODEM_USB_MODESWITCH_VENDOR=12d1
MODEM_USB_MODESWITCH_ARGS="--huawei-new-mode -s 3"

# Huawei Hi-Link optimizations
MODEM_HILINK_DMZ=1
MODEM_HILINK_FULLCONE_NAT=1
